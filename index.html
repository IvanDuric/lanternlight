<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Lanternlight — Episode 01</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background:#000; }
    #start { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #1a1512; color: #ece7e1; text-align: center; padding: 24px; }
    #start .kicker { letter-spacing: 3px; font-size: 13px; opacity:.8; }
    #start h1 { font-size: 24px; letter-spacing: 1px; margin: 6px 0 10px; }
    #start p  { max-width: 300px; opacity: .85; line-height: 1.5; margin: 0; }
    #start button { margin-top: 22px; padding: 14px 30px; font-size: 18px; font-weight: 700;
      border: none; border-radius: 12px; background: #d64b3a; color: white; }
    #hint { position: fixed; bottom: 22px; left: 0; right: 0; z-index: 50; text-align: center;
      color: #fff; text-shadow: 0 1px 4px #000; font-size: 15px; pointer-events: none; }
    #caption { position: fixed; bottom: 8%; left: 0; right: 0; z-index: 60; text-align: center;
      padding: 0 24px; pointer-events: none; color: #fff; font-size: 19px; line-height: 1.4; font-weight: 500;
      text-shadow: 0 2px 8px #000, 0 0 2px #000; opacity: 0; transition: opacity .4s; white-space: pre-line; }
    #chapter { position: fixed; top: 14px; left: 16px; z-index: 60; pointer-events:none;
      color:#fff; font-size:13px; letter-spacing:2px; text-shadow:0 1px 4px #000; }
    #chapter b { color:#d64b3a; }
  </style>
</head>
<body>
  <div id="start">
    <div class="kicker">LANTERNLIGHT · 01 / 10</div>
    <h1>The Light in Your Pocket</h1>
    <p>Point your camera at your Sparkstone card, then tap Fenn to light the way. Sound on 🔊</p>
    <button id="startBtn">Tap to begin</button>
    <p id="err" style="color:#ffb4a8; font-size:13px; margin-top:14px; max-width:300px;"></p>
  </div>


  <div id="chapter" style="display:none;">LANTERNLIGHT · <b>01</b> / 10</div>
  <div id="hint" style="display:none;">Aim at your card ✨</div>
  <div id="caption"></div>
  <div id="goal" style="display:none; position:fixed; top:64px; left:0; right:0; z-index:60; text-align:center;
       color:#ffe8b0; font-size:16px; font-weight:500; text-shadow:0 2px 6px #000; pointer-events:none;">Tap Fenn to light the lantern ✨</div>
  <div id="counter" style="display:none; position:fixed; top:64px; right:16px; z-index:60; color:#eaff9a;
       font-size:15px; font-weight:500; text-shadow:0 2px 6px #000; pointer-events:none;">0 / 14 woken</div>
  <div id="banner" style="display:none; opacity:0; position:fixed; top:34%; left:0; right:0; z-index:65; text-align:center;
       padding:0 24px; color:#fff; font-size:23px; font-weight:700; line-height:1.35; text-shadow:0 3px 10px #000;
       pointer-events:none; transition:opacity .5s; white-space:pre-line;"></div>
  <div id="blackout" style="position:fixed; inset:0; z-index:70; background:#000; opacity:0; pointer-events:none; transition:opacity .9s;"></div>

  <audio id="narration" src="./narration.mp3" preload="auto"></audio>
  <audio id="music" src="./music.mp3" preload="auto" loop></audio>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF: 0.00005; filterBeta: 5; missTolerance: 5; warmupTolerance: 5;"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true, exposure: 1.1"
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="sceneModel" src="./scene.glb"></a-asset-item>
      <a-asset-item id="foxModel"   src="./fox.glb"></a-asset-item>
      <video id="introVid" src="./intro.mp4" preload="auto" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Global lights start DIM (the grey, unlit forest). igniteWorld() brightens them. -->
    <a-entity id="ambient" light="type: ambient; intensity: 0.34; color: #8f9ac0"></a-entity>
    <a-entity id="sun"     light="type: directional; intensity: 0.4; color: #b7c2e0" position="1 2 1"></a-entity>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- PHASE 1: intro video, overlaid exactly on the card (same size + proportions). -->
      <a-video id="introPlane" src="#introVid" width="1" height="1.583"
               position="0 0 0.01" rotation="0 0 0" visible="false"></a-video>

      <!-- RIG (PHASE 2): hidden until the intro ends, then rises up.
           Lays the composition DOWN so the CARD is the floor. Flip 90 to -90 if it points wrong. -->
      <a-entity id="rig" rotation="90 0 0" visible="false" scale="0.05 0.05 0.05"
                animation__grow="property: scale; from: 0.05 0.05 0.05; to: 4 4 4; dur: 1400; easing: easeOutBack; startEvents: reveal">

        <!-- Diorama, flat on the card -->
        <a-gltf-model id="diorama" src="#sceneModel" position="0 0 0" rotation="0 0 0" scale="0.7 0.7 0.7"></a-gltf-model>

        <!-- Warm glow pool on the ground -->
        <a-circle id="portal" radius="0.5" color="#ffcf6b" opacity="0.2" position="0 0.01 0" rotation="-90 0 0"
                  material="shader: flat; transparent: true"
                  animation="property: scale; from: 0.1 0.1 0.1; to: 1 1 1; dur: 700; easing: easeOutBack; startEvents: reveal"></a-circle>

        <!-- Lantern glow: OFF until ignite. Positioned inside your hanging lantern (scene mesh 3). -->
        <a-light id="lanternGlow" type="point" color="#ffb347" intensity="0" distance="1.3" position="-0.18 0.29 -0.24"></a-light>
        <a-sphere id="lanternCore" radius="0.03" color="#fff2c0" visible="false" position="-0.18 0.29 -0.24"
                  material="shader: flat; emissive: #ffcf6b"></a-sphere>

        <!-- Faint pulsing ember BEFORE ignite: hints "tap to relight me". Hidden once lit. -->
        <a-light id="emberLight" type="point" color="#ff9d3c" intensity="0.12" distance="0.8" position="-0.18 0.29 -0.24"
                 animation="property: light.intensity; dir: alternate; loop: true; from: 0.06; to: 0.28; dur: 1100; easing: easeInOutSine; startEvents: reveal"></a-light>
        <a-sphere id="lanternEmber" radius="0.02" color="#ff9d3c" position="-0.18 0.29 -0.24"
                  material="shader: flat; transparent: true; opacity: 0.4"
                  animation__o="property: material.opacity; dir: alternate; loop: true; from: 0.2; to: 0.65; dur: 1100; easing: easeInOutSine; startEvents: reveal"
                  animation__s="property: scale; dir: alternate; loop: true; from: 0.8 0.8 0.8; to: 1.35 1.35 1.35; dur: 1100; easing: easeInOutSine; startEvents: reveal"></a-sphere>

        <!-- THE FOX: feet on the card floor, small, rises out of the card. -->
        <a-gltf-model id="fox" src="#foxModel" position="0 0 0" rotation="0 0 0" scale="0.32 0.32 0.32"
                      class="clickable"
                      animation__rise="property: position; from: 0 -0.12 0; to: 0 0 0; dur: 900; easing: easeOutCubic; startEvents: reveal"
                      animation__bob="property: position; dir: alternate; loop: true; from: 0 0 0; to: 0 0.03 0; dur: 1800; easing: easeInOutSine; delay: 900; startEvents: reveal">
        </a-gltf-model>

        <!-- Fireflies (Glimmerlings) get added here when the lantern is lit -->
        <a-entity id="fireflies"></a-entity>
      </a-entity>

      <!-- Label stays flat on the card, facing the viewer -->
      <a-text id="collected" value="Collected!  Find card 02 →" align="center"
              color="#ffffff" position="0 -0.55 0.02" width="1.8" visible="false"></a-text>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const startEl = document.getElementById('start');
    const startBtn = document.getElementById('startBtn');
    const hintEl = document.getElementById('hint');
    const chapterEl = document.getElementById('chapter');
    const capEl = document.getElementById('caption');
    const narration = document.getElementById('narration');
    const music = document.getElementById('music');
    const targetEl = document.querySelector('[mindar-image-target]');
    const collected = document.getElementById('collected');
    const foxEl = document.getElementById('fox');
    const introVid = document.getElementById('introVid');
    const introPlane = document.getElementById('introPlane');
    const blackout = document.getElementById('blackout');
    const goalEl = document.getElementById('goal');
    const counterEl = document.getElementById('counter');
    const bannerEl = document.getElementById('banner');

    // Times measured from your narration.mp3 (each line's start).
    const CAPTIONS = [
      { t: 0.0,  text: "Every light starts the same way.\nSmall. Uncertain. Yours." },
      { t: 6.1,  text: "This is Fenn. His lantern went out\na long time ago." },
      { t: 11.2, text: "He's been waiting — not for a hero.\nFor you." },
      { t: 16.1, text: "So light it. Go on." },
      { t: 20.1, text: "The whole world's been holding its breath." },
      { t: 23.0, text: "" }
    ];
    let playedOnce = false, ignited = false, introPlayed = false, introBroken = false;

    function showCaption(t){ capEl.textContent = t; capEl.style.opacity = t ? 1 : 0; }
    let bannerTimer = null;
    function showBanner(text, ms){
      bannerEl.textContent = text; bannerEl.style.display = 'block';
      requestAnimationFrame(() => { bannerEl.style.opacity = 1; });
      clearTimeout(bannerTimer);
      bannerTimer = setTimeout(() => { bannerEl.style.opacity = 0; setTimeout(() => { bannerEl.style.display = 'none'; }, 500); }, ms);
    }
    // Captions follow the audio clock, so they stay in sync through any pause/flicker.
    function captionAt(time){
      let cur = ""; for (const c of CAPTIONS){ if (time >= c.t) cur = c.text; else break; } return cur;
    }
    narration.addEventListener('timeupdate', () => {
      if (playedOnce) showCaption(captionAt(narration.currentTime));
    });

    // The Episode 1 payoff: the dark forest lights up.
    function igniteWorld(){
      if (ignited) return; ignited = true;
      ['lanternEmber','emberLight'].forEach(id => { const e = document.getElementById(id); if (e) e.setAttribute('visible', false); });
      document.getElementById('ambient').setAttribute('animation__i',
        'property: light.intensity; to: 0.95; dur: 1200; easing: easeOutCubic');
      document.getElementById('ambient').setAttribute('animation__c',
        'property: light.color; to: #fff3e0; dur: 1200');
      document.getElementById('sun').setAttribute('animation__i',
        'property: light.intensity; to: 1.1; dur: 1200; easing: easeOutCubic');
      document.getElementById('lanternGlow').setAttribute('animation__on',
        'property: light.intensity; to: 1.2; dur: 900; easing: easeOutBack');
      const core = document.getElementById('lanternCore');
      core.setAttribute('visible', true);
      core.setAttribute('animation__p',
        'property: scale; dir: alternate; loop: true; from: 1 1 1; to: 1.4 1.4 1.4; dur: 1400; easing: easeInOutSine');
      spawnFireflies();                                   // Glimmerlings stream out of the lantern
      goalEl.textContent = 'Tap the fireflies to wake them ✨';
      counterEl.textContent = '0 / ' + NUM_FLIES + ' woken';
      counterEl.style.display = 'block';
      showBanner('Catch the Glimmerlings!\nTap the flying lights ✨', 3800);
    }

    // Collecting the fireflies (the mini-game after lighting).
    let collectedCount = 0;
    function collectFirefly(f){
      if (f.collected) return;
      f.collected = true; f.collectT = 0;
      collectedCount++;
      counterEl.textContent = collectedCount + ' / ' + NUM_FLIES + ' woken';
      if (collectedCount >= NUM_FLIES){
        goalEl.style.display = 'none';
        counterEl.textContent = 'All ' + NUM_FLIES + ' woken! ✨';
        finale();
      }
    }
    // When every Glimmerling is woken: celebrate + tease the next card.
    function finale(){
      foxEl.setAttribute('animation__cheer',
        'property: scale; dir: alternate; loop: 3; from: 0.32 0.32 0.32; to: 0.42 0.42 0.42; dur: 220; easing: easeInOutSine');
      document.getElementById('lanternGlow').setAttribute('animation__bloom',
        'property: light.intensity; to: 2.2; dur: 1000; easing: easeOutCubic');
      document.getElementById('ambient').setAttribute('animation__bright',
        'property: light.intensity; to: 1.25; dur: 1000');
      showBanner('You woke the Underglow! ✨', 3000);
      setTimeout(() => showBanner('A friend is waiting in the dark…\nFind card 02', 4500), 3200);
      setTimeout(() => { collected.setAttribute('value', 'Card 1 of 10 relit ✨   Find card 02 →'); collected.setAttribute('visible', true); }, 3400);
    }
    // Forgiving tap: collect the firefly nearest the finger (no need for a precise hit).
    function collectNearest(ev){
      const cam = sceneEl.camera; if (!cam || !flies.length) return;
      const rect = sceneEl.canvas.getBoundingClientRect();
      const v = new THREE.Vector3();
      let best = null, bestD = 1e9;
      for (const f of flies){
        if (f.collected) continue;
        f.el.object3D.getWorldPosition(v); v.project(cam);
        const sx = rect.left + (v.x * 0.5 + 0.5) * rect.width;
        const sy = rect.top + (-v.y * 0.5 + 0.5) * rect.height;
        const d = Math.hypot(sx - ev.clientX, sy - ev.clientY);
        if (d < bestD){ bestD = d; best = f; }
      }
      if (best && bestD < 90) collectFirefly(best);
    }

    // Fireflies (Glimmerlings) that stream out of the lantern when it's lit, then orbit the scene.
    const NUM_FLIES = 14;
    let flies = [], fliesActive = false, fliesLastT = 0;
    const FLY_CENTER = { x: 0, y: 0.45, z: 0 };          // orbit center of the scene (rig-local)
    const FLY_SRC = { x: -0.18, y: 0.29, z: -0.24 };     // the lantern (they emerge from here)
    function easeOut(t){ return 1 - Math.pow(1 - t, 3); }
    function spawnFireflies(){
      if (fliesActive) return; fliesActive = true;
      const container = document.getElementById('fireflies');
      for (let i = 0; i < NUM_FLIES; i++){
        const s = document.createElement('a-sphere');
        s.setAttribute('radius', 0.018);
        s.setAttribute('color', '#eaff9a');
        s.setAttribute('material', 'shader: flat; transparent: true; opacity: 0');
        s.setAttribute('position', FLY_SRC.x + ' ' + FLY_SRC.y + ' ' + FLY_SRC.z);
        container.appendChild(s);
        flies.push({
          el: s,
          r: 0.35 + Math.random() * 0.5,
          theta: Math.random() * Math.PI * 2,
          phi: 0.4 + Math.random() * 2.3,
          thSpd: (0.2 + Math.random() * 0.5) * (Math.random() < 0.5 ? -1 : 1),
          phSpd: (0.1 + Math.random() * 0.3) * (Math.random() < 0.5 ? -1 : 1),
          blink: Math.random() * Math.PI * 2,
          blSpd: 1.5 + Math.random() * 2.5,
          spawn: 0, delay: Math.random() * 1.4
        });
      }
      fliesLastT = performance.now();
      requestAnimationFrame(flyTick);
    }
    function flyTick(now){
      if (!fliesActive) return;
      const dt = Math.min(0.05, (now - fliesLastT) / 1000); fliesLastT = now;
      for (const f of flies){
        if (f.collected){                                 // gathered: rise, shrink, fade out
          f.collectT += dt;
          f.el.object3D.position.y += dt * 0.5;
          const sc = Math.max(0.001, f.el.object3D.scale.x - dt * 1.6);
          f.el.object3D.scale.set(sc, sc, sc);
          const mm = f.el.getObject3D('mesh');
          if (mm) mm.material.opacity = Math.max(0, mm.material.opacity - dt * 2.5);
          if (f.collectT > 0.7) f.el.setAttribute('visible', false);
          continue;
        }
        if (f.delay > 0){ f.delay -= dt; }
        else if (f.spawn < 1){ f.spawn = Math.min(1, f.spawn + dt / 1.5); }
        f.theta += f.thSpd * dt; f.phi += f.phSpd * dt; f.blink += f.blSpd * dt;
        const tx = FLY_CENTER.x + f.r * Math.sin(f.phi) * Math.cos(f.theta);
        const ty = FLY_CENTER.y + f.r * 0.55 * Math.cos(f.phi);
        const tz = FLY_CENTER.z + f.r * Math.sin(f.phi) * Math.sin(f.theta);
        const e = easeOut(f.spawn);
        f.el.object3D.position.set(
          FLY_SRC.x + (tx - FLY_SRC.x) * e,
          FLY_SRC.y + (ty - FLY_SRC.y) * e,
          FLY_SRC.z + (tz - FLY_SRC.z) * e);
        const m = f.el.getObject3D('mesh');
        if (m){ m.material.transparent = true; m.material.opacity = (f.delay > 0 ? 0 : (0.4 + 0.35 * Math.sin(f.blink)) * Math.min(1, f.spawn * 2)); }
      }
      requestAnimationFrame(flyTick);
    }

    startBtn.addEventListener('click', async () => {
      startBtn.textContent = 'Starting…';
      document.getElementById('err').textContent = '';
      [narration, music, introVid].forEach(a => { a.muted = true; const p = a.play(); if (p) p.then(()=>{ a.pause(); a.currentTime = 0; a.muted = false; }).catch(()=>{ a.muted = false; }); });
      try {
        const sys = sceneEl.systems['mindar-image-system'];
        if (!sys) throw new Error('MindAR not ready — reload the page.');
        await sys.start();
        startEl.style.display = 'none';
        hintEl.style.display = 'block';
        chapterEl.style.display = 'block';
      } catch (err) {
        startBtn.textContent = 'Tap to retry';
        document.getElementById('err').textContent = 'Could not start: ' + (err.message || err);
      }
    });

    // Two-finger pinch to zoom the whole scene in/out.
    const rigEl = document.getElementById('rig');
    let pinchStart = 0, rigScale = 4;   // matches the grown final size
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const d = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY);
        if (!pinchStart) { pinchStart = d; return; }
        const s = Math.max(0.5, Math.min(9, rigScale * d / pinchStart));
        rigEl.object3D.scale.set(s, s, s);
        rigEl.dataset.scale = s;
      }
    }, { passive: false });
    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2 && pinchStart) {
        rigScale = parseFloat(rigEl.dataset.scale) || rigScale;
        pinchStart = 0;
      }
    });

    // PHASE 2: lantern out -> full black -> dark 3D world emerges -> goal: light the lantern.
    function revealScene(){
      if (playedOnce) return; playedOnce = true; introPlayed = true;
      introVid.pause();
      introPlane.setAttribute('visible', false);
      document.getElementById('rig').setAttribute('visible', true);
      blackout.style.transition = 'none';
      blackout.style.opacity = 1;                        // hold the darkness from the intro
      requestAnimationFrame(() => {
        // darkness lifts AND the scene grows out of the card at the same moment
        blackout.style.transition = 'opacity 1.1s';
        blackout.style.opacity = 0;
        ['rig','fox','portal','lanternEmber','emberLight'].forEach(id => { const e = document.getElementById(id); if (e) e.emit('reveal'); });
        music.volume = 0.22;                             // duck the music bed under narration
        narration.currentTime = 0; narration.play().catch(()=>{});
        goalEl.style.display = 'block';                  // "Tap Fenn to light the lantern" (stays until tapped)
      });
    }
    introVid.addEventListener('error', () => { introBroken = true; });
    introVid.addEventListener('ended', revealScene);

    targetEl.addEventListener('targetFound', () => {
      hintEl.style.display = 'none';
      if (!introPlayed) {
        // PHASE 1: play the intro video over the card
        if (introBroken) { revealScene(); return; }   // no intro.mp4 -> skip to 3D
        introPlane.setAttribute('visible', true);
        if (music.paused) { music.volume = 0.35; music.play().catch(()=>{}); }   // single music bed, from the intro on
        if (introVid.paused) introVid.play().catch(() => revealScene());  // resume, don't restart
      }
      // after the reveal, the story keeps playing regardless of tracking
    });

    targetEl.addEventListener('targetLost', () => {
      if (!introPlayed) introVid.pause();   // pause the intro only during phase 1
    });

    narration.addEventListener('ended', () => {
      showCaption(''); music.volume = 0.3;   // narration done; "tap Fenn" hint stays until the child lights it
    });

    // Tap Fenn → he spins AND lights the lantern (the interactive relight).
    sceneEl.addEventListener('click', (ev) => {
      if (!playedOnce) return;                     // ignore taps during the intro
      if (!ignited){                               // first tap: light the lantern
        foxEl.setAttribute('animation__tap',
          'property: rotation; from: 0 0 0; to: 0 360 0; dur: 700; easing: easeOutQuad');
        igniteWorld();
        return;
      }
      collectNearest(ev);                          // after lit: gather the fireflies
    });
  </script>
</body>
</html>
